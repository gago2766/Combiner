<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أداة دمج الصور المتقدمة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* CSS styles */
        :root {
            --bg-color: #f4f7f9; --text-color: #333; --primary-color: #007bff; --primary-hover: #0056b3; --card-bg: #ffffff; --border-color: #e0e0e0; --success-color: #28a745; --warning-color: #ffc107; --danger-color: #dc3545; --disabled-color: #ccc; --input-bg: #fff;
        }
        html.dark-mode {
            --bg-color: #1a1a2e; --text-color: #e0e0e0; --primary-color: #1e90ff; --primary-hover: #1c7ed6; --card-bg: #2a2a40; --border-color: #40405a; --input-bg: #3a3a52;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: flex-start; transition: background-color 0.3s, color 0.3s; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 800px; background-color: var(--card-bg); border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); padding: 2.5rem; transition: background-color 0.3s;
        }
        header {
            display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 2rem;
        }
        header h1 {
            margin: 0; font-size: 1.8rem; color: var(--primary-color);
        }
        .dark-mode-toggle {
            cursor: pointer; background: none; border: none; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background-color 0.2s;
        }
        .dark-mode-toggle:hover { background-color: rgba(128, 128, 128, 0.2); }
        .dark-mode-toggle .icon { width: 24px; height: 24px; fill: var(--text-color); }
        #sun-icon { display: none; }
        html.dark-mode #moon-icon { display: none; }
        html.dark-mode #sun-icon { display: block; }
        #uploader { text-align: center; }
        .drop-zone {
            border: 3px dashed var(--border-color); border-radius: 12px; padding: 3rem 1rem; cursor: pointer; transition: border-color 0.3s, background-color 0.3s;
        }
        .drop-zone.dragover { border-color: var(--primary-color); background-color: rgba(0, 123, 255, 0.05); }
        .drop-zone .icon { width: 64px; height: 64px; fill: var(--primary-color); margin-bottom: 1rem; }
        .drop-zone p { margin: 0; font-size: 1.1rem; }
        .drop-zone .file-input-label { color: var(--primary-color); font-weight: bold; text-decoration: underline; }
        #fileInput { display: none; }
        #settings {
            margin-top: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; align-items: center;
        }
        .setting-group { display: flex; flex-direction: column; }
        .setting-group label { margin-bottom: 0.5rem; font-weight: 600; }
        .setting-group input[type="range"], .setting-group select {
            width: 100%; padding: 0.5rem; background-color: var(--input-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit; font-size: 1rem;
        }
        .setting-group input[type="range"] { padding: 0; }
        .range-value { font-weight: bold; color: var(--primary-color); margin-left: 0.5rem; }
        #autoSplit { margin-left: 0.5rem; }
        #start-btn {
            grid-column: 1 / -1; padding: 0.8rem 1.5rem; font-size: 1.1rem; font-weight: bold; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.3s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        #start-btn:hover { background-color: var(--primary-hover); }
        #start-btn:active { transform: scale(0.98); }
        #start-btn:disabled { background-color: var(--disabled-color); cursor: not-allowed; }
        #start-btn .icon { width: 20px; height: 20px; fill: white; }
        .hidden { display: none !important; }
        #processing-area, #results-area {
            margin-top: 2rem; padding: 1.5rem; border: 1px solid var(--border-color); border-radius: 8px; text-align: center;
        }
        #processing-area h3 { margin-top: 0; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        #processing-area .icon { width: 24px; height: 24px; fill: var(--primary-color); animation: spin 1.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .progress-bar-container { width: 100%; background-color: var(--border-color); border-radius: 20px; overflow: hidden; margin: 1rem 0; }
        #progress-bar { width: 0%; height: 20px; background-color: var(--success-color); transition: width 0.3s ease-in-out; text-align: center; line-height: 20px; color: white; font-weight: bold; }
        #eta, #progress-status { font-size: 0.9rem; color: var(--text-color); opacity: 0.8; }
        #results-area h3 { margin-top: 0; color: var(--success-color); display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        #results-area .icon { width: 24px; height: 24px; fill: var(--success-color); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1.5rem; text-align: right; }
        .stat-item { background-color: var(--bg-color); padding: 1rem; border-radius: 8px; border-left: 4px solid var(--primary-color); }
        .stat-item strong { display: block; margin-bottom: 0.25rem; color: var(--text-color); opacity: 0.7; font-size: 0.9rem; }
        .stat-item span { font-size: 1.2rem; font-weight: bold; }
        #alert-box {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 1rem 2rem; border-radius: 8px; color: white; font-weight: bold; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; display: flex; align-items: center; gap: 0.75rem;
        }
        #alert-box.show { opacity: 1; visibility: visible; }
        #alert-box.success { background-color: var(--success-color); }
        #alert-box.warning { background-color: var(--warning-color); color: #333; }
        #alert-box.danger { background-color: var(--danger-color); }
        #alert-box .icon { width: 24px; height: 24px; fill: white; }
        #alert-box.warning .icon { fill: #333; }
    </style>
</head>
<body>

    <!-- Icons SVG Definitions -->
    <svg width="0" height="0" class="hidden">
      <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 4h14v-2H5z"/></symbol>
      <symbol id="icon-process" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></symbol>
      <symbol id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2V7h2v7z"/></symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24"><path d="M9.37,5.51C9.19,6.15,9.1,6.82,9.1,7.5c0,4.08,3.32,7.4,7.4,7.4c0.68,0,1.35-0.09,1.99-0.27C17.45,17.19,14.93,19,12,19 c-3.86,0-7-3.14-7-7C5,9.07,6.81,6.55,9.37,5.51z M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36 c-0.98,1.37-2.58,2.26-4.4,2.26c-2.98,0-5.4-2.42-5.4-5.4c0-1.82,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/></symbol>
      <symbol id="icon-sun" viewBox="0 0 24 24"><path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7z M2,13h2c0.55,0,1-0.45,1-1s-0.45-1-1-1H2c-0.55,0-1,0.45-1,1 S1.45,13,2,13z M20,13h2c0.55,0,1-0.45,1-1s-0.45-1-1-1h-2c-0.55,0-1,0.45-1,1S19.45,13,20,13z M11,2v2c0,0.55,0.45,1,1,1s1-0.45,1-1 V2c0-0.55-0.45-1-1-1S11,1.45,11,2z M11,20v2c0,0.55,0.45,1,1,1s1-0.45,1-1v-2c0-0.55-0.45-1-1-1S11,19.45,11,20z M5.99,4.58 c-0.39-0.39-1.02-0.39-1.41,0s-0.39,1.02,0,1.41l1.06,1.06c0.39,0.39,1.02,0.39,1.41,0s0.39-1.02,0-1.41L5.99,4.58z M18.36,16.95 c-0.39-0.39-1.02-0.39-1.41,0s-0.39,1.02,0,1.41l1.06,1.06c0.39,0.39,1.02,0.39,1.41,0s0.39-1.02,0-1.41L18.36,16.95z M19.42,5.99 c0.39-0.39,0.39-1.02,0-1.41s-1.02-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.02,0,1.41s1.02,0.39,1.41,0L19.42,5.99z M7.05,18.36 c0.39-0.39,0.39-1.02,0-1.41s-1.02-0.39-1.41,0l-1.06,1.06c-0.39,0.39-0.39,1.02,0,1.41s1.02,0.39,1.41,0L7.05,18.36z"/></symbol>
    </svg>
    
    <div id="alert-box">
        <svg class="icon" id="alert-icon-placeholder"><use href="#icon-alert"></use></svg>
        <span id="alert-message"></span>
    </div>

    <div class="container">
        <header>
            <h1>أداة دمج الصور</h1>
            <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle Dark Mode">
                <svg class="icon" id="moon-icon"><use href="#icon-moon"></use></svg>
                <svg class="icon" id="sun-icon"><use href="#icon-sun"></use></svg>
            </button>
        </header>

        <main>
            <div id="uploader">
                <div class="drop-zone" id="dropZone">
                    <svg class="icon"><use href="#icon-upload"></use></svg>
                    <p>اسحب وأفلت ملف .zip هنا، أو <label for="fileInput" class="file-input-label">اختر ملفًا</label></p>
                    <input type="file" id="fileInput" accept=".zip">
                </div>
                <div id="file-info" class="hidden" style="margin-top: 1rem; font-weight: bold;"></div>
            </div>

            <div id="settings" class="hidden">
                <!-- START: ADDED ASPECT RATIO SETTING -->
                <div class="setting-group">
                    <label for="aspectRatio">نسبة أبعاد الصورة لكل صورة</label>
                    <select id="aspectRatio">
                        <option value="original" selected>الأصلي (بدون قص)</option>
                        <option value="1">1:1 (مربع)</option>
                        <option value="0.75">3:4 (عمودي)</option>
                        <option value="1.3333">4:3 (أفقي)</option>
                        <option value="0.5625">9:16 (شاشة هاتف)</option>
                        <option value="1.7777">16:9 (شاشة عريضة)</option>
                    </select>
                </div>
                <!-- END: ADDED ASPECT RATIO SETTING -->

                <div class="setting-group">
                    <label for="uniformWidth">العرض الموحد للصور (بكسل)</label>
                    <div>
                        <input type="range" id="uniformWidth" min="720" max="800" value="750" step="10">
                        <span class="range-value" id="uniformWidthValue">750</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="maxLength">الطول الأقصى للصورة الواحدة (بكسل)</label>
                    <div>
                        <input type="range" id="maxLength" min="1000" max="30000" value="10000" step="1000">
                        <span class="range-value" id="maxLengthValue">10000</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="quality">جودة الصورة (JPEG)</label>
                    <div>
                        <input type="range" id="quality" min="0.1" max="1.0" value="0.8" step="0.05">
                        <span class="range-value" id="qualityValue">80%</span>
                    </div>
                </div>
                <div class="setting-group" style="flex-direction: row; align-items: center;">
                    <label for="autoSplit">تقطيع الصور الطويلة تلقائيًا</label>
                    <input type="checkbox" id="autoSplit" checked>
                </div>
                
                <button id="start-btn" disabled>
                    <svg class="icon"><use href="#icon-play"></use></svg>
                    ابدأ الدمج
                </button>
            </div>
            
            <div id="processing-area" class="hidden">
                 <h3><svg class="icon"><use href="#icon-process"></use></svg> جاري المعالجة...</h3>
                <div class="progress-bar-container"><div id="progress-bar">0%</div></div>
                <div id="progress-status">التحضير...</div>
                <div id="eta">الوقت المتبقي: حساب...</div>
            </div>

            <div id="results-area" class="hidden">
                <h3><svg class="icon"><use href="#icon-check"></use></svg> اكتملت العملية بنجاح!</h3>
                <div class="stats-grid"></div>
                <p style="margin-top: 1.5rem;">تم تجميع الصور الناتجة في ملف .zip جاهز للتحميل.</p>
            </div>
        </main>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // DOM elements
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('file-info');
    const startBtn = document.getElementById('start-btn');
    const settingsDiv = document.getElementById('settings');
    const processingArea = document.getElementById('processing-area');
    const resultsArea = document.getElementById('results-area');
    const progressBar = document.getElementById('progress-bar');
    const progressStatus = document.getElementById('progress-status');
    const etaDisplay = document.getElementById('eta');
    
    // Settings elements
    const aspectRatioSelect = document.getElementById('aspectRatio'); // NEW
    const uniformWidthSlider = document.getElementById('uniformWidth');
    const uniformWidthValue = document.getElementById('uniformWidthValue');
    const maxLengthSlider = document.getElementById('maxLength');
    const maxLengthValue = document.getElementById('maxLengthValue');
    const qualitySlider = document.getElementById('quality');
    const qualityValue = document.getElementById('qualityValue');
    const autoSplitCheckbox = document.getElementById('autoSplit');
    const darkModeToggle = document.getElementById('darkModeToggle');

    let selectedFile = null;
    let totalOriginalSize = 0;

    const showAlert = (message, type = 'danger', duration = 4000) => {
        const alertBox = document.getElementById('alert-box');
        const alertMessage = document.getElementById('alert-message');
        const alertIcon = document.getElementById('alert-icon-placeholder');
        alertBox.className = 'alert-box';
        alertBox.classList.add(type);
        alertMessage.textContent = message;
        let iconId = '#icon-alert';
        if (type === 'success') iconId = '#icon-check';
        alertIcon.innerHTML = `<use href="${iconId}"></use>`;
        alertBox.classList.add('show');
        setTimeout(() => { alertBox.classList.remove('show'); }, duration);
    };

    const formatBytes = (bytes, decimals = 2) => {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    };

    const applyDarkMode = (isDark) => {
        document.documentElement.classList.toggle('dark-mode', isDark);
        localStorage.setItem('darkMode', isDark);
    };
    
    darkModeToggle.addEventListener('click', () => {
        applyDarkMode(!document.documentElement.classList.contains('dark-mode'));
    });
    
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedMode = localStorage.getItem('darkMode');
    applyDarkMode(savedMode !== null ? savedMode === 'true' : prefersDark);
    
    uniformWidthSlider.addEventListener('input', (e) => { uniformWidthValue.textContent = e.target.value; });
    maxLengthSlider.addEventListener('input', (e) => { maxLengthValue.textContent = e.target.value; });
    qualitySlider.addEventListener('input', (e) => { qualityValue.textContent = `${Math.round(e.target.value * 100)}%`; });

    const setupDragAndDrop = () => {
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
        });
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });
    };
    setupDragAndDrop();

    function handleFile(file) {
        if (file && file.type === 'application/zip') {
            selectedFile = file;
            fileInfo.textContent = `الملف المحدد: ${file.name} (${formatBytes(file.size)})`;
            fileInfo.classList.remove('hidden');
            settingsDiv.classList.remove('hidden');
            startBtn.disabled = false;
            resultsArea.classList.add('hidden');
            processingArea.classList.add('hidden');
        } else {
            showAlert('الرجاء اختيار ملف .zip صالح.', 'warning');
            selectedFile = null;
            fileInfo.classList.add('hidden');
            settingsDiv.classList.add('hidden');
            startBtn.disabled = true;
        }
    }

    startBtn.addEventListener('click', async () => {
        if (!selectedFile) { showAlert('لم يتم اختيار ملف!'); return; }
        startBtn.disabled = true;
        settingsDiv.classList.add('hidden');
        processingArea.classList.remove('hidden');
        resultsArea.classList.add('hidden');
        progressBar.style.width = '0%'; progressBar.textContent = '0%';
        progressStatus.textContent = 'قراءة ملف ZIP...';
        etaDisplay.textContent = 'الوقت المتبقي: حساب...';
        totalOriginalSize = 0;
        const startTime = performance.now();
        try {
            const zip = await JSZip.loadAsync(selectedFile);
            const imageFiles = [];
            zip.forEach((_, zipEntry) => {
                if (!zipEntry.dir && /\.(jpe?g|png|webp)$/i.test(zipEntry.name)) {
                    imageFiles.push(zipEntry);
                    totalOriginalSize += zipEntry._data.uncompressedSize;
                }
            });
            imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));
            if (imageFiles.length === 0) throw new Error('ملف ZIP لا يحتوي على صور صالحة.');
            await processImagesInBatches(imageFiles, startTime);
        } catch (error) {
            console.error(error);
            showAlert(`حدث خطأ: ${error.message}`, 'danger');
            resetUI();
        }
    });

    async function processImagesInBatches(imageFiles, startTime) {
        const BATCH_SIZE = 5;
        const totalImages = imageFiles.length;
        let processedCount = 0;
        let canvases = [];
        let workingCanvas, ctx, currentY;
        
        // Get Settings
        const selectedRatioValue = aspectRatioSelect.value;
        const targetWidth = parseInt(uniformWidthSlider.value, 10);
        const maxLength = parseInt(maxLengthSlider.value, 10);
        const autoSplit = autoSplitCheckbox.checked;

        function createNewWorkingCanvas() {
            workingCanvas = document.createElement('canvas');
            workingCanvas.width = targetWidth;
            workingCanvas.height = maxLength;
            ctx = workingCanvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, workingCanvas.width, workingCanvas.height);
            currentY = 0;
        }

        for (let i = 0; i < totalImages; i += BATCH_SIZE) {
            progressStatus.textContent = `معالجة الصور ${i + 1} - ${Math.min(i + BATCH_SIZE, totalImages)} من ${totalImages}...`;
            
            const batch = imageFiles.slice(i, i + BATCH_SIZE);

            const imagePromises = batch.map(file => 
                file.async('blob').then(blob => new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => { URL.revokeObjectURL(img.src); resolve(img); };
                    img.onerror = reject;
                    img.src = URL.createObjectURL(blob);
                }))
            );

            const loadedImages = await Promise.all(imagePromises);
            
            for (const img of loadedImages) {
                if (!workingCanvas) { createNewWorkingCanvas(); }
                
                let newHeight;
                // Variables for center cropping
                let sx = 0, sy = 0, sWidth = img.width, sHeight = img.height;

                // --- START: ASPECT RATIO CALCULATION AND CROPPING LOGIC ---
                if (selectedRatioValue === 'original') {
                    // Keep original aspect ratio
                    const imgRatio = img.width / img.height;
                    newHeight = Math.round(targetWidth / imgRatio);
                } else {
                    // Force selected aspect ratio
                    const targetRatio = parseFloat(selectedRatioValue);
                    newHeight = Math.round(targetWidth / targetRatio);
                    
                    const imgRatio = img.width / img.height;

                    if (imgRatio > targetRatio) {
                        // Original image is wider than target ratio (Crop left and right)
                        sHeight = img.height;
                        sWidth = img.height * targetRatio;
                        sx = (img.width - sWidth) / 2;
                        sy = 0;
                    } else {
                        // Original image is taller than target ratio (Crop top and bottom)
                        sWidth = img.width;
                        sHeight = img.width / targetRatio;
                        sx = 0;
                        sy = (img.height - sHeight) / 2;
                    }
                }
                // --- END: ASPECT RATIO CALCULATION ---

                if (autoSplit && currentY > 0 && currentY + newHeight > maxLength) {
                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = targetWidth;
                    finalCanvas.height = currentY; 
                    finalCanvas.getContext('2d').drawImage(workingCanvas, 0, 0, targetWidth, currentY, 0, 0, targetWidth, currentY);
                    canvases.push(finalCanvas);
                    createNewWorkingCanvas();
                }

                // Draw the cropped/resized image onto the canvas
                ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, currentY, targetWidth, newHeight);
                currentY += newHeight;
            }

            processedCount += batch.length;
            const progress = (processedCount / totalImages) * 100;
            progressBar.style.width = `${progress}%`;
            progressBar.textContent = `${Math.round(progress)}%`;
            const timeElapsed = (performance.now() - startTime) / 1000;
            const timePerImage = timeElapsed / processedCount;
            const remainingTime = Math.round(timePerImage * (totalImages - processedCount));
            etaDisplay.textContent = `الوقت المتبقي: ~${remainingTime} ثانية`;
        }

        if (workingCanvas && currentY > 0) {
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = targetWidth;
            finalCanvas.height = currentY;
            finalCanvas.getContext('2d').drawImage(workingCanvas, 0, 0, targetWidth, currentY, 0, 0, targetWidth, currentY);
            canvases.push(finalCanvas);
        }
        
        await finalizeAndDownload(canvases, startTime, imageFiles.length);
    }
    
    async function finalizeAndDownload(canvases, startTime, originalImageCount) {
        progressStatus.textContent = 'إنشاء ملف ZIP النهائي...';
        etaDisplay.textContent = '';
        const outputZip = new JSZip();
        const quality = parseFloat(qualitySlider.value);
        let totalFinalWidth = 0, totalFinalHeight = 0;
        
        for (let i = 0; i < canvases.length; i++) {
            const canvas = canvases[i];
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
            const paddedIndex = (i + 1).toString().padStart(3, '0');
            outputZip.file(`${paddedIndex}.jpg`, blob);
            totalFinalWidth = canvas.width;
            totalFinalHeight += canvas.height;
        }
        
        const content = await outputZip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(content);
        link.download = `${selectedFile.name.replace('.zip', '')}_combined.zip`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        const endTime = performance.now();
        showResults(originalImageCount, canvases.length, totalFinalWidth, totalFinalHeight, (endTime - startTime) / 1000);
    }
    
    function showResults(originalCount, splitCount, finalWidth, finalHeight, timeTaken) {
        processingArea.classList.add('hidden');
        resultsArea.classList.remove('hidden');
        const statsGrid = document.querySelector('#results-area .stats-grid');
        statsGrid.innerHTML = `
            <div class="stat-item"><strong>الصور الأصلية</strong><span>${originalCount}</span></div>
            <div class="stat-item"><strong>الصور الناتجة</strong><span>${splitCount}</span></div>
            <div class="stat-item"><strong>الحجم الأصلي</strong><span>${formatBytes(totalOriginalSize)}</span></div>
            <div class="stat-item"><strong>الوقت المستغرق</strong><span>${timeTaken.toFixed(2)}s</span></div>
            <div class="stat-item" style="grid-column: 1 / -1;">
                <strong>الأبعاد (العرض × الطول الإجمالي)</strong>
                <span>${finalWidth}x${finalHeight}px</span>
            </div>`;
        showAlert('تم إنشاء الملف بنجاح!', 'success');
        resetUI();
    }
    
    function resetUI() {
        startBtn.disabled = false;
        settingsDiv.classList.remove('hidden');
    }
});
</script>
